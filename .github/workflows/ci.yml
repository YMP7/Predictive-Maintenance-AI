name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y build-essential libffi-dev python3-dev
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest httpx
        
    - name: Start Infrastructure (TimescaleDB & Mosquitto)
      env:
        TSDB_PASSWORD: devpassword123
      run: |
        docker compose up -d timescaledb mosquitto
        
        # Wait for database to be ready
        echo "Waiting for TimescaleDB to be ready..."
        for i in {1..30}; do
          if docker exec timescaledb pg_isready -U dtwin -d digital_twin; then
            echo "Database is ready!"
            break
          fi
          sleep 2
        done

    - name: Run Database Migrations
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        PYTHONPATH: .
      run: python scripts/migrate.py
        
    - name: Run Pytest Test Suite
      env:
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        PYTHONPATH: .
      run: |
        pytest tests/ -q

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: './client/package-lock.json'
        
    - name: Install Dependencies
      working-directory: ./client
      run: npm install
        
    - name: Build React Application
      working-directory: ./client
      run: npm run build
